name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-desktop.txt

      - name: Read desktop version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from desktop.version import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Validate tag matches desktop version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $expectedTag = python -c "from desktop.version import release_tag_for; print(release_tag_for())"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref_name }} does not match desktop version tag $expectedTag"
          }

      - name: Build desktop app
        shell: pwsh
        run: |
          python -m PyInstaller build\crownledger_local.spec --noconfirm --clean
          python -m PyInstaller build\crownledger_updater.spec --noconfirm --clean
          Copy-Item dist\CrownLedgerUpdater.exe dist\CrownLedgerLocal\CrownLedgerUpdater.exe -Force

      - name: Archive build
        id: archive
        shell: pwsh
        run: |
          $zipName = "CrownLedgerLocal-$env:VERSION-windows-x64.zip"
          Compress-Archive -Path dist\CrownLedgerLocal\* -DestinationPath "dist\$zipName"
          "zip_path=dist/$zipName" >> $env:GITHUB_OUTPUT
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrownLedgerLocal-${{ steps.version.outputs.version }}-windows-x64
          path: ${{ steps.archive.outputs.zip_path }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.zip_path }}
          generate_release_notes: true
